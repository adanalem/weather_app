<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Weather App</title>
    <!-- Custom Scrollbar CSS  -->
    <style>
        .custom-scroll::-webkit-scrollbar { height: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.1); border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.4); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>

<body class="h-screen w-screen overflow-hidden relative flex items-center justify-center font-sans bg-slate-950">

  
  <video id="bg-video" autoplay loop muted playsinline 
         class="absolute top-0 left-0 w-full h-full object-cover -z-10 brightness-50 contrast-100">
    <source id="video-source" src="assets/videos/clearday.mp4" type="video/mp4">
  </video>

  <div class="absolute top-0 left-0 w-full h-full bg-black/40 backdrop-blur-[2px] -z-20 pointer-events-none"></div>

  <!-- Main Responsive Wrapper (Adapts fluidly from small mobile screens to desktop) -->
  <div class="relative z-10 w-full max-w-md sm:max-w-lg p-4 sm:p-6 mx-auto flex flex-col gap-4 sm:gap-6">

    <form id="weather-form" class="bg-slate-950/40 backdrop-blur-xl font-serif rounded-3xl p-5 sm:p-6 border border-white/10 shadow-2xl shadow-black/50">
      
      <div class="flex items-center gap-2 sm:gap-3 mb-5 sm:mb-6">
        <input type="text" id="search-input" placeholder="Enter city name..." 
               class="flex-grow bg-white/5 text-white placeholder-white/40 rounded-xl sm:rounded-2xl px-4 py-2.5 sm:px-5 sm:py-3 outline-none border border-white/10 focus:border-white/20 focus:bg-white/10 transition-all text-sm sm:text-base">
        <button type="submit" class="bg-white/10 hover:bg-white/20 active:scale-95 text-white px-5 py-2.5 sm:px-6 sm:py-3 rounded-xl sm:rounded-2xl transition-all font-medium border border-white/10 shadow-lg text-sm sm:text-base cursor-pointer">
          Search
        </button>
      </div>

      <div class="text-white text-center py-2 sm:py-4">
        <h1 id="city_name" class="text-3xl sm:text-4xl font-light tracking-wide mb-1 drop-shadow-md">Karachi</h1>
        <p id="temperature" class="text-7xl sm:text-8xl font-extralight leading-none tracking-tighter drop-shadow-md select-none">33°</p>
        <p id="Description" class="text-base sm:text-lg font-light opacity-90 uppercase tracking-widest mt-4 bg-white/5 py-1 px-4 rounded-full inline-block text-xs sm:text-sm border border-white/5">
          Partly Sunny
        </p>
      </div>
<p id="live-date" class="text-xs tracking-widest opacity-60 mb-2 uppercase text-center text-white"></p>

<div class="grid grid-cols-3 gap-3 text-white text-center">
  <div class="bg-slate-950/40 backdrop-blur-xl rounded-2xl p-3 border border-white/10 shadow-xl shadow-black/20">
    <span class="text-[10px] opacity-50 uppercase tracking-wider block mb-0.5">Feels Like</span>
    <span id="feels_like" class="text-base font-bold">--°</span>
  </div>
  <div class="bg-slate-950/40 backdrop-blur-xl rounded-2xl p-3 border border-white/10 shadow-xl shadow-black/20">
    <span class="text-[10px] opacity-50 uppercase tracking-wider block mb-0.5">Humidity</span>
    <span id="humidity" class="text-base font-bold">--%</span>
  </div>
  <div class="bg-slate-950/40 backdrop-blur-xl rounded-2xl p-3 border border-white/10 shadow-xl shadow-black/20">
    <span class="text-[10px] opacity-50 uppercase tracking-wider block mb-0.5">Wind</span>
    <span id="wind_speed" class="text-base font-bold">-- km/h</span>
  </div>
</div>

    </form>

    <div class="bg-slate-950/40 backdrop-blur-xl font-serif rounded-3xl p-4 sm:p-5 text-white border border-white/10 shadow-2xl shadow-black/50">
      <h2 class="text-xs sm:text-sm font-semibold mb-3 sm:mb-4 opacity-70 uppercase tracking-widest flex items-center gap-2">
        🕒 Hourly Forecast (Next 24h)
      </h2>
      
      <div id="hourly-container" class="flex gap-3 overflow-x-auto pb-2 custom-scroll snap-x scroll-smooth">
      </div>
    </div>

  </div>
</body>
<script src="app.js"></script>
</html>
